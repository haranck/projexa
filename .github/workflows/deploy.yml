name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/projexa/backend
            echo "Pull latest code"
            git pull origin main
            echo "Stop containers"
            docker-compose down
            echo "Pull latest image"
            docker pull haranck/projexa-backend:latest
            echo "Start containers"
            docker-compose up -d
          # script: |
          #   cd /home/ec2-user/projexa/backend
          #   git pull origin main
          #   docker-compose down
          #   docker rmi haranck/projexa-backend:latest
          #   docker pull haranck/projexa-backend:latest
          #   docker-compose up -d --build
